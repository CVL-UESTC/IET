name: IET-SR-x4-classical
model_type: IETModel
scale: 4
num_gpu: 1  # set num_gpu: 0 for cpu mode
manual_seed: 0

datasets:
  test_1:
    name: Set5
    type: PairedImageDataset
    dataroot_gt: datasets/TestDataSR/HR/Set5/x4
    dataroot_lq: datasets/TestDataSR/LR/LRBI/Set5/x4
    io_backend:
      type: disk

  test_2:
    name: Set14
    type: PairedImageDataset
    dataroot_gt: datasets/TestDataSR/HR/Set14/x4
    dataroot_lq: datasets/TestDataSR/LR/LRBI/Set14/x4
    io_backend:
      type: disk

  test_3:
    name: BSD100
    type: PairedImageDataset
    dataroot_gt: datasets/TestDataSR/HR/B100/x4
    dataroot_lq: datasets/TestDataSR/LR/LRBI/B100/x4
    io_backend:
      type: disk


  test_4:
    name: Urban100
    type: PairedImageDataset
    dataroot_gt: datasets/TestDataSR/HR/Urban100/x4
    dataroot_lq: datasets/TestDataSR/LR/LRBI/Urban100/x4
    io_backend:
      type: disk


  test_5:
    name: Manga109
    type: PairedImageDataset
    dataroot_gt: datasets/TestDataSR/HR/Manga109/x4
    dataroot_lq: datasets/TestDataSR/LR/LRBI/Manga109/x4
    io_backend:
      type: disk


# network structures
network_g:
  type: IET
  nattn_dim: 240
  topk_focus: [[914, 914, 225, 225], [325, 225, 225, 125], [225, 125, 125, 125], [185, 81, 81, 81], [121, 81, 81, 81], [64, 64, 64, 64], [36, 36, 36, 36], [24, 24, 24, 24]]
  topk_prop_1: [22, 20, 14, 12, 0, 0, 0, 0]
  topk_prop_2: [12, 10, 7, 6, 0, 0, 0, 0]
  topk_prop_3: [100, 100, 60, 40, 0, 0, 0, 0]
  upscale: 4
  in_chans: 3
  img_size: 82
  embed_dim: 240
  depths: [4, 4, 4, 4, 4, 4, 4, 4,]
  num_heads: 6
  local_range: 17
  sparse_range: 25
  dilation: 3
  convffn_kernel_size: 5
  img_range: 1.
  mlp_ratio: 2
  upsampler: 'pixelshuffle'
  resi_connection: '1conv'
  use_checkpoint: true

# path
path:
  pretrain_network_g: experiments/pretrained_models/IET-SR-classical-x4.pth
  strict_load_g: yes
  param_key_g: params_ema

# validation settings
val:
  save_img: true
  suffix: ~  # add suffix to saved images, if None, use exp name

  metrics:
    psnr: # metric name, can be arbitrary
      type: calculate_psnr
      crop_border: 4
      test_y_channel: yes
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: yes
